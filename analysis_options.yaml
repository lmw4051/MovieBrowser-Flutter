# Include the strict rules from very_good_analysis
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  # Exclude auto-generated files to prevent linter errors
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

  errors:
    # This warning must be ignored when using Freezed with json_serializable
    invalid_annotation_target: ignore

    # Downgrade or disable certain rules (fine-tune based on team preferences)
    public_member_api_docs: ignore # Can be disabled if you don't want to enforce documentation for every public member
